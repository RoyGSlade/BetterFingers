<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>The Lost Meaning: Infinite Stacks</title>
<link rel="stylesheet" href="/src/stacks.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<header class="topbar">
  <img class="topbar-icon" src="/src/assets/icon.png" alt="" aria-hidden="true">
  <div>
    <h1>The Lost Meaning</h1>
    <p class="topbar-tagline">infinite stacks &middot; the spire is cracked, and it remembers you</p>
  </div>
</header>

<main id="main">
  <p id="game-status" class="sr-only" role="status" aria-live="polite"></p>

  <section id="join-panel" aria-labelledby="join-heading">
    <img class="stacks-key-art" src="/src/assets/key-art.jpg" alt="Key art: a bureaucratic dragon presiding over a spire of stacked paperwork.">
    <h2 id="join-heading">Enter the Spire</h2>
    <p class="stacks-join-tagline">It was sealed for a reason.<br>The reason is leaking out.</p>

    <label for="access-code-input">Seal phrase <span class="stacks-label-hint">&mdash; the access code your keeper gave you</span></label>
    <input id="access-code-input" name="access-code" type="password" autocomplete="off" spellcheck="false">

    <label for="room-code-input">Room sigil <span class="stacks-label-hint">&mdash; the room code; leave blank to kindle a new run</span></label>
    <input id="room-code-input" name="room-code" type="text" autocomplete="off" spellcheck="false">

    <div class="stacks-join-actions">
      <button id="join-room-button" type="button">Answer the Summons</button>
      <button id="create-room-button" type="button">Kindle a New Run</button>
    </div>
    <p id="join-status" role="status" aria-live="polite"></p>
    <p class="stacks-join-footnote">local network only &middot; nothing you do here is saved, or forgiven</p>
  </section>

  <section id="character-builder-screen" aria-label="Create your hero" hidden></section>
  <section id="map-screen" aria-label="Map" hidden></section>
  <section id="room-screen" aria-label="Room" hidden></section>
  <section id="puzzle-screen" aria-label="Puzzle" hidden></section>
  <section id="combat-screen" aria-label="Combat" hidden></section>

  <!-- Playtest D1/D2: persistent character sheet, visible on every screen
       above except character creation itself -- see main.js's renderChrome
       comment for why nothing here is ever pushed below the fold. -->
  <aside id="character-panel" aria-label="Character sheet" hidden></aside>

  <!-- Playtest A1: hand dock, fixed at center-bottom (the standard card-game
       hand position), also visible on every screen except character
       creation. -->
  <section id="hand-dock" aria-label="Hand" hidden></section>
</main>

<!-- Playtest B1/B2/A4/C1: help button, contextual hint line, first-run rules
     overlay, and the explicit-confirm bar -- all built by main.js's
     renderChrome into this one fixed-position container. -->
<div id="stacks-chrome"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
