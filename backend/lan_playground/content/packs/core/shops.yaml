# Shop archetypes (infinite_stacks.md §9.6, §23.3). Loaded by
# content/loader.py's load_shops() (kept out of the main _ITEM_FILES table --
# shops.yaml is optional and validated separately, see loader.py's module
# note). Every item_id below must exist in items.yaml; content/validators.py's
# check_shop_item_references enforces that at CI time.
shops:
  - id: marginalia_exchange
    name: The Marginalia Exchange
    persona:
      name: Rundel Ashgrove
      tagline: "Every weapon here was somebody's afterthought."
      tone: brusque
    services: [buy, sell, repair, identify]
    sell_price_ratio: 0.5
    repair_cost_per_wear: 4
    identify_price: 8
    treatment_price: 0
    guaranteed_inventory:
      - item_id: argumentative_buckler
        buy_price: 18
        stock: 3
      - item_id: comma_blade
        buy_price: 22
        stock: 2
      - item_id: boots_of_premature_entrance
        buy_price: 16
        stock: 3
      - item_id: battered_buckler
        buy_price: 9
        stock: 4
      - item_id: improvised_tools
        buy_price: 6
        stock: 5
      - item_id: repair_patch
        buy_price: 5
        stock: 6
    rotating_pool:
      - item_id: index_hook
        buy_price: 14
        stock: 1
      - item_id: traveler_waystone
        buy_price: 20
        stock: 1
      - item_id: loophole_rope
        buy_price: 12
        stock: 1
      - item_id: chalk_of_loud_silence
        buy_price: 10
        stock: 1
    rotating_slots: 2
    rumor:
      id: marginalia_rumor_ledger
      text: >-
        "Rundel keeps a second ledger. Nobody's seen what's in it, but
        everyone who's asked has gotten a discount on their next visit."
      accessible_text: >-
        Rumor: the shopkeeper keeps a private ledger of some kind; asking
        about it has reportedly led to future discounts for other patrons.
    relationship_complication:
      id: marginalia_complication_debt
      description: >-
        Rundel is quietly underwater on this stall's rent to a Spire
        creditor; a hero who offers to help (or who threatens to make it
        worse) changes how future visits open, not the prices on the wall.
      accessible_text: >-
        Relationship complication: the shopkeeper owes money to someone in
        the Spire. Helping or threatening over this affects future dialogue
        only, never the posted prices.

  - id: apothecary_of_second_thoughts
    name: The Apothecary of Second Thoughts
    persona:
      name: Sennet Quire
      tagline: "Everything here is for a mistake you haven't made yet."
      tone: cryptic
    services: [buy, sell, treat, identify]
    sell_price_ratio: 0.4
    repair_cost_per_wear: 0
    identify_price: 6
    treatment_price: 12
    guaranteed_inventory:
      - item_id: field_suture
        buy_price: 11
        stock: 4
      - item_id: bottled_footnote
        buy_price: 15
        stock: 3
      - item_id: suspicious_sandwich
        buy_price: 4
        stock: 6
      - item_id: questionable_seal
        buy_price: 7
        stock: 3
      - item_id: second_opinion_token
        buy_price: 13
        stock: 2
    rotating_pool:
      - item_id: red_string_spool
        buy_price: 17
        stock: 1
      - item_id: family_notes
        buy_price: 9
        stock: 1
      - item_id: counterfeit_charm
        buy_price: 10
        stock: 1
      - item_id: emergency_semicolon
        buy_price: 19
        stock: 1
    rotating_slots: 2
    rumor:
      id: apothecary_rumor_regulars
      text: >-
        "Sennet's regulars all seem to be carrying the same charm. None of
        them will say where they got it, but none of them will sell it back
        either."
      accessible_text: >-
        Rumor: several of the shop's regular customers carry a matching
        charm; its origin and their reluctance to part with it are unstated.
    relationship_complication:
      id: apothecary_complication_favor
      description: >-
        Sennet once treated a hero's rival for free. Bringing that rival up
        -- kindly or otherwise -- changes the tone of future visits, not
        the posted treatment price.
      accessible_text: >-
        Relationship complication: the shopkeeper has a prior, unpaid favor
        connected to a known rival. Raising it affects future dialogue
        tone only, never the posted prices.
