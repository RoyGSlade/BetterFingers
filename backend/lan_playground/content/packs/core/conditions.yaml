# The Lost Meaning: Infinite Stacks -- core pack.
# 6 statuses from infinite_stacks.md §16.4, each with one primary effect and
# at least one treatment.
conditions:
  - id: bleeding
    name: Bleeding
    prose:
      fallback: A wound that will not close on its own.
      accessible: "Condition: Bleeding. Lose 1 HP after a strenuous action until treated."
    primary_effect: {op: modify_hp, args: {amount: -1}}
    duration: until_treated
    treatments:
      - id: bandage_treatment
        prose:
          fallback: Apply a bandage or basic medicine.
          accessible: "Treatment: apply a bandage or basic medicine to remove Bleeding."
        effects:
          - {op: remove_condition, args: {condition_id: bleeding}}
      - id: safe_rest_treatment
        prose:
          fallback: A safe rest closes the wound.
          accessible: "Treatment: a safe rest removes Bleeding."
        effects:
          - {op: remove_condition, args: {condition_id: bleeding}}

  - id: burning
    name: Burning
    prose:
      fallback: Flames that keep working after the source is gone.
      accessible: "Condition: Burning. Take damage at the end of each round until extinguished."
    primary_effect: {op: modify_hp, args: {amount: -2}}
    duration: rounds:2
    treatments:
      - id: water_treatment
        prose:
          fallback: Douse the flames with water.
          accessible: "Treatment: douse the flames with water to remove Burning."
        effects:
          - {op: remove_condition, args: {condition_id: burning}}
      - id: extinguish_action_treatment
        prose:
          fallback: Spend an action smothering the flames.
          accessible: "Treatment: spend an action smothering the flames to remove Burning."
        effects:
          - {op: remove_condition, args: {condition_id: burning}}

  - id: frightened
    name: Frightened
    prose:
      fallback: The body refuses to move toward the thing that caused this.
      accessible: "Condition: Frightened. Cannot willingly approach the source until rallied, distanced, or the source is removed."
    primary_effect: {op: grant_disadvantage, args: {}}
    duration: until_source_removed
    treatments:
      - id: rally_treatment
        prose:
          fallback: An ally's rallying word breaks the freeze.
          accessible: "Treatment: an ally rallies the hero to remove Frightened."
        effects:
          - {op: remove_condition, args: {condition_id: frightened}}
      - id: distance_treatment
        prose:
          fallback: Put enough distance between the hero and the source.
          accessible: "Treatment: move far enough from the source to remove Frightened."
        effects:
          - {op: remove_condition, args: {condition_id: frightened}}

  - id: confused
    name: Confused
    prose:
      fallback: Two possible targets look equally correct.
      accessible: "Condition: Confused. The first targeted action this hero takes shows two possible targets until aided or the room ends."
    primary_effect: {op: grant_disadvantage, args: {}}
    duration: until_first_action
    treatments:
      - id: read_wordcraft_aid_treatment
        prose:
          fallback: An ally's Read or Wordcraft aid clears the picture.
          accessible: "Treatment: an ally aids with Read or Wordcraft to remove Confused."
        effects:
          - {op: remove_condition, args: {condition_id: confused}}
      - id: room_end_treatment
        prose:
          fallback: The confusion clears once the room resolves.
          accessible: "Treatment: Confused clears automatically when the room ends."
        effects:
          - {op: remove_condition, args: {condition_id: confused}}

  - id: silenced
    name: Silenced
    prose:
      fallback: The words are there. They will not come out as speech.
      accessible: "Condition: Silenced. Cannot use speech-tagged cards until the source is broken, a writing tool is used, or the room ends."
    primary_effect: {op: emit_fact, args: {fact_id: speech_cards_blocked}}
    duration: until_source_removed
    treatments:
      - id: break_source_treatment
        prose:
          fallback: Break whatever is causing the silence.
          accessible: "Treatment: break the source of the silence to remove Silenced."
        effects:
          - {op: remove_condition, args: {condition_id: silenced}}
      - id: writing_tool_treatment
        prose:
          fallback: Communicate in writing instead.
          accessible: "Treatment: use a writing tool to work around Silenced until it is removed."
        effects:
          - {op: remove_condition, args: {condition_id: silenced}}

  - id: sickened
    name: Sickened
    prose:
      fallback: Something is wrong under the skin, and it saps every hard effort.
      accessible: "Condition: Sickened. Disadvantage on Force recovery checks until diagnosed and treated with the correct antidote."
    primary_effect: {op: grant_disadvantage, args: {}}
    duration: until_treated
    treatments:
      - id: antidote_treatment
        prose:
          fallback: The correct antidote clears the sickness.
          accessible: "Treatment: apply the correct antidote to remove Sickened."
        effects:
          - {op: remove_condition, args: {condition_id: sickened}}
      - id: diagnosis_treatment
        prose:
          fallback: A successful diagnosis identifies the correct treatment.
          accessible: "Treatment: diagnose the sickness, then treat it, to remove Sickened."
        effects:
          - {op: remove_condition, args: {condition_id: sickened}}
