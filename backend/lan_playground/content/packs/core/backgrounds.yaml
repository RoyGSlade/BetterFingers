# The Lost Meaning: Infinite Stacks -- core pack.
# The 4 starting backgrounds (infinite_stacks.md §11.3), each with its
# signature ability. Each background's starter card lives in cards.yaml with
# matching `source`; starting items live in items.yaml with matching ids.
backgrounds:
  - id: exiled_court_scribe
    name: Exiled Court Scribe
    prose:
      fallback: Once wrote law for a court that no longer exists. Still writes as if every word could be enforced.
      accessible: "Background: Exiled Court Scribe. +1 Presence. Rank 1 Wordcraft and Read. Starts with the Questionable Seal and a Blank Contract card."
    attribute_bonus: presence
    skill_ranks:
      wordcraft: 1
      read: 1
    starting_item_ids: [questionable_seal]
    signature_ability:
      id: binding_mark
      name: Binding Mark
      prose:
        fallback: Once per floor, mark one exact phrase as binding or explicitly non-binding before it is spoken.
        accessible: "Signature ability: Binding Mark. Once per floor, mark one exact phrase as binding or explicitly non-binding before it is spoken."
      frequency: once_per_floor
      effects:
        - {op: emit_fact, args: {fact_id: phrase_binding_declared}}

  - id: back_alley_fixer
    name: Back-Alley Fixer
    prose:
      fallback: Learned to repair things that were never meant to be opened, using tools that were never meant for the job.
      accessible: "Background: Back-Alley Fixer. +1 Insight. Rank 1 Tinker and Scheme. Starts with Improvised Tools and one Repair Patch."
    attribute_bonus: insight
    skill_ranks:
      tinker: 1
      scheme: 1
    starting_item_ids: [improvised_tools, repair_patch]
    signature_ability:
      id: field_conversion
      name: Field Conversion
      prose:
        fallback: Once per room, convert a visible harmless object into a one-use tool if the table can explain its function.
        accessible: "Signature ability: Field Conversion. Once per room, convert a visible harmless object into a one-use tool if the table can explain its function."
      frequency: once_per_room
      effects:
        - {op: emit_fact, args: {fact_id: object_converted_to_tool}}

  - id: retired_monster_hunter
    name: Retired Monster Hunter
    prose:
      fallback: Hung up the trade, but the trade never quite let go.
      accessible: "Background: Retired Monster Hunter. +1 Force. Rank 1 Bonk and Read. Starts with a Battered Buckler and family notes for one enemy type."
    attribute_bonus: force
    skill_ranks:
      bonk: 1
      read: 1
    starting_item_ids: [battered_buckler, family_notes]
    signature_ability:
      id: known_weakness
      name: Known Weakness
      prose:
        fallback: The first time each fight an enemy reveals its intent, mark one weakness or false tell.
        accessible: "Signature ability: Known Weakness. The first time each fight an enemy reveals its intent, mark one weakness or false tell."
      frequency: once_per_fight
      effects:
        - {op: reveal_tell, args: {}}

  - id: traveling_charlatan
    name: Traveling Charlatan
    prose:
      fallback: Sold the same bridge twice and left both buyers satisfied.
      accessible: "Background: Traveling Charlatan. +1 Finesse. Rank 1 Scheme and Wordcraft. Starts with a Counterfeit Charm and a concealed item slot."
    attribute_bonus: finesse
    skill_ranks:
      scheme: 1
      wordcraft: 1
    starting_item_ids: [counterfeit_charm]
    signature_ability:
      id: ordinary_disguise
      name: Ordinary Disguise
      prose:
        fallback: Once per floor, present an ordinary item as something more important; the deception works until evidence directly contradicts it.
        accessible: "Signature ability: Ordinary Disguise. Once per floor, present an ordinary item as something more important; the deception works until evidence directly contradicts it."
      frequency: once_per_floor
      effects:
        - {op: emit_fact, args: {fact_id: item_presented_as_important}}
