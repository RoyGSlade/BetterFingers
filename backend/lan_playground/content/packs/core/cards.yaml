# The Lost Meaning: Infinite Stacks -- core pack.
# 24 cards (§23.3 first-playable target). Covers every §13.3 contract field:
# timing, range/targets, required state, exact base effect OR check+outcome
# table, combination tags, discard/Exhaust, fallback text, accessible text.
# Sources: general (5), four per background x 4 backgrounds (16), persona
# signature (1), equipment-granted (2).
#
# Wave-3 note (board task #11, stacks-heroes): heroes/cards.py only allows a
# deck to be built from cards whose entire effect list compiles to this
# wave's LIVE §5 ops (reveal_room/grant_check/spend_energy/emit_fact -- see
# docs/INFINITE_STACKS_CONTRACTS.md §5). Every general/background/persona
# card below is authored LIVE-only on purpose so any background produces a
# buildable starting deck this wave. `comma_cut` and `subtext_flash` (both
# equipment-granted, optional per §13.2's "up to two") are deliberately left
# using PLANNED combat ops (damage/apply_condition/reveal_tell) -- they are
# real future combat content, not yet buildable into a deck, and serve as the
# real-content example `tests/test_stacks_heroes.py` uses for the loud
# build-time rejection case.
cards:
  - id: steady_strike
    name: Steady Strike
    prose:
      fallback: A disciplined melee blow, thrown with more control than force.
      accessible: "Card: Steady Strike. Main action, melee range, targets one enemy. Force + Bonk check against DC 11."
    accessible_text: "Steady Strike. Main action. Melee range. Target: one enemy. Roll Force + Bonk vs DC 11. Strong success deals 3 damage, clean success deals 2, a costly success deals 1 damage, a setback grants the enemy Advantage on its next action."
    timing: main_action
    range: melee
    legal_targets: [enemy]
    check:
      attribute: force
      skill: bonk
      dc: 11
      outcomes:
        strong_success:
          - {op: damage, args: {amount: 3}}
        success:
          - {op: damage, args: {amount: 2}}
        cost:
          - {op: damage, args: {amount: 1}}
        setback:
          - {op: grant_disadvantage, args: {}}
    combination_tags: [melee, bonk]
    end_state: discard
    source: general

  - id: read_the_room
    name: Read the Room
    prose:
      fallback: Take a breath and notice what everyone else is missing.
      accessible: "Card: Read the Room. Quick interaction, affects the current room, targets self. Insight + Read check against DC 11."
    accessible_text: "Read the Room. Quick interaction. Range: the current room. Target: self. Roll Insight + Read vs DC 11. Strong success records a major observed tell, clean success records a minor one, a costly success records a partial read, a setback costs 1 Energy re-focusing."
    timing: quick_interaction
    range: room
    legal_targets: [self]
    check:
      attribute: insight
      skill: read
      dc: 11
      outcomes:
        strong_success:
          - {op: emit_fact, args: {fact_id: tell_revealed_major}}
        success:
          - {op: emit_fact, args: {fact_id: tell_revealed_minor}}
        cost:
          - {op: emit_fact, args: {fact_id: partial_read}}
        setback:
          - {op: spend_energy, args: {amount: 1}}
    combination_tags: [information, read]
    end_state: discard
    source: general

  - id: guarded_stance
    name: Guarded Stance
    prose:
      fallback: Plant both feet and take the hit on purpose.
      accessible: "Card: Guarded Stance. Reaction, self only. Blocks 2 damage from the triggering attack, no roll required."
    accessible_text: "Guarded Stance. Reaction. Target: self. Blocks 2 damage from the attack that triggered it. No roll."
    timing: reaction
    range: self
    legal_targets: [self]
    base_effects:
      - {op: block_damage, args: {amount: 2}}
    combination_tags: [defense]
    end_state: discard
    source: general

  - id: rally_cry
    name: Rally Cry
    prose:
      fallback: One sharp, sincere word aimed at whoever needs it most.
      accessible: "Card: Rally Cry. Main action, affects the current room, targets one ally. Removes the Frightened condition, no roll required."
    accessible_text: "Rally Cry. Main action. Range: the current room. Target: one ally. Removes the Frightened condition from the target. No roll."
    timing: main_action
    range: room
    legal_targets: [ally]
    base_effects:
      - {op: remove_condition, args: {condition_id: frightened}}
    combination_tags: [support, wordcraft]
    end_state: discard
    source: general

  - id: plain_warning
    name: Plain Warning
    prose:
      fallback: A short, unambiguous sentence spoken so everyone in earshot understands it the same way.
      accessible: "Card: Plain Warning. Free speech, affects the current room, can target an ally or an enemy. Records a warning fact, no roll required."
    accessible_text: "Plain Warning. Free speech. Range: the current room. Target: one ally or one enemy. Records that a warning was given. No roll."
    timing: free_speech
    range: room
    legal_targets: [ally, enemy]
    base_effects:
      - {op: emit_fact, args: {fact_id: warning_given}}
    combination_tags: [communication]
    end_state: discard
    source: general

  # --- Exiled Court Scribe (4) ---------------------------------------------

  - id: blank_contract
    name: Blank Contract
    prose:
      fallback: A single clause, left open until it is spoken aloud and marked binding or not.
      accessible: "Card: Blank Contract. Quick interaction, self only. Records that a phrase has been marked binding or non-binding ahead of being spoken, no roll required. Exiled Court Scribe background card."
    accessible_text: "Blank Contract. Quick interaction. Target: self. Records that the next spoken phrase has been marked binding or non-binding. No roll."
    timing: quick_interaction
    range: self
    legal_targets: [self]
    base_effects:
      - {op: emit_fact, args: {fact_id: binding_clause_marked}}
    combination_tags: [contract, wordcraft]
    end_state: discard
    source: exiled_court_scribe

  - id: sealed_precedent
    name: Sealed Precedent
    prose:
      fallback: Cite a precedent so old that no one in the room can safely contradict it.
      accessible: "Card: Sealed Precedent. Main action, affects the current room, targets one NPC. Presence + Wordcraft check against DC 11. Exiled Court Scribe background card."
    accessible_text: "Sealed Precedent. Main action. Range: the current room. Target: one NPC. Roll Presence + Wordcraft vs DC 11. Strong success records the precedent as accepted and reveals what lies past the north connector, clean success records it accepted, a costly success records a partial acceptance, a setback costs 1 Energy re-arguing the point."
    timing: main_action
    range: room
    legal_targets: [npc]
    check:
      attribute: presence
      skill: wordcraft
      dc: 11
      outcomes:
        strong_success:
          - {op: emit_fact, args: {fact_id: precedent_accepted}}
          - {op: reveal_room, args: {connector: north}}
        success:
          - {op: emit_fact, args: {fact_id: precedent_accepted}}
        cost:
          - {op: emit_fact, args: {fact_id: precedent_partial}}
        setback:
          - {op: spend_energy, args: {amount: 1}}
    combination_tags: [contract, wordcraft]
    end_state: discard
    source: exiled_court_scribe

  - id: procedural_objection
    name: Procedural Objection
    prose:
      fallback: "\"Objection\" is a complete sentence when it is said with enough conviction."
      accessible: "Card: Procedural Objection. Reaction, affects the current room, targets one NPC or enemy. Records a formal objection, no roll required. Exiled Court Scribe background card."
    accessible_text: "Procedural Objection. Reaction. Range: the current room. Target: one NPC or enemy. Records that a formal objection was raised against the target's last statement or action. No roll."
    timing: reaction
    range: room
    legal_targets: [npc, enemy]
    base_effects:
      - {op: emit_fact, args: {fact_id: objection_raised}}
    combination_tags: [contract, reaction]
    end_state: discard
    source: exiled_court_scribe

  - id: footnote_citation
    name: Footnote Citation
    prose:
      fallback: Somewhere in the fine print is a clause describing exactly what's through that door.
      accessible: "Card: Footnote Citation. Quick interaction, self only. Reveals what lies past the north connector, no roll required. Exiled Court Scribe background card. Exhausted after use."
    accessible_text: "Footnote Citation. Quick interaction. Target: self. Reveals what lies past the north connector. No roll. Exhausted after use, not discarded."
    timing: quick_interaction
    range: self
    legal_targets: [self]
    base_effects:
      - {op: reveal_room, args: {connector: north}}
    combination_tags: [contract, knowledge]
    end_state: exhaust
    source: exiled_court_scribe

  # --- Back-Alley Fixer (4) -------------------------------------------------

  - id: field_patch
    name: Field Patch
    prose:
      fallback: A quick mend, good enough to keep someone standing.
      accessible: "Card: Field Patch. Main action, melee range, targets self or an ally. Requires a carried repair patch. Insight + Tinker check against DC 11. Back-Alley Fixer background card."
    accessible_text: "Field Patch. Main action. Melee range. Target: self or one ally. Requires a carried repair patch. Roll Insight + Tinker vs DC 11. Strong success and clean success both record the wound as properly mended, a costly success records a partial mend, a setback costs 1 Energy fumbling the patch. Exhausted after use, not discarded."
    timing: main_action
    range: melee
    legal_targets: [self, ally]
    required_state: ["tag:has_repair_patch"]
    check:
      attribute: insight
      skill: tinker
      dc: 11
      outcomes:
        strong_success:
          - {op: emit_fact, args: {fact_id: wound_mended_well}}
        success:
          - {op: emit_fact, args: {fact_id: wound_mended}}
        cost:
          - {op: emit_fact, args: {fact_id: wound_mended_partial}}
        setback:
          - {op: spend_energy, args: {amount: 1}}
    combination_tags: [support, tinker]
    end_state: exhaust
    source: back_alley_fixer

  - id: quick_bypass
    name: Quick Bypass
