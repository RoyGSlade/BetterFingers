# The Lost Meaning: Infinite Stacks -- core pack.
# 24 cards (§23.3 first-playable target). Wave-6 redesign (board task #20,
# docs/PLAYTEST_FINDINGS_2026-07-19.md §E): the owner's verdict was "a card
# should only be given when it's earned and should be something actually
# cool -- not a basic ability like 'I look around'." Five offenders moved OUT
# of the deck into backend/lan_playground/content/packs/core/abilities.yaml
# (read_the_room, plain_warning -- general; veteran_instinct, trophy_notes --
# retired_monster_hunter). `signature_flourish` (the mandatory persona card,
# §13.2) stayed a card -- deck.build_starting_deck requires exactly one
# persona signature card for every background, so removing it would break
# the composition gate -- and was redesigned in place with real mechanics
# instead (E2's "cut OR redesigned" branch).
#
# Every surviving card now carries: a `keywords` list, an `art_ref` (one of
# the 3 real frame illustrations stacks-facelift copied to
# backend/lan_playground/static/src/assets/cards/{charm,scheme,bonk}.png --
# classified per card: enemy-target/melee/bonk -> bonk, ally/support/
# communication/persona -> charm, else -> scheme), and a non-empty mechanic
# with real numbers/targets/durations (§E3). Cards that were pure
# emit_fact-only flavor (blank_contract, procedural_objection,
# scavenged_shim, grease_the_gears, concealed_pocket) now also grant a real,
# numbered follow-up check (`grant_check`, DC 8) so the "no roll" flavor
# beat still produces a concrete mechanical opportunity.
#
# Wave-3 note (board task #11, stacks-heroes), still true: heroes/cards.py
# only allows a deck to be built from cards whose entire effect list compiles
# to this wave's LIVE §5 ops (reveal_room/grant_check/spend_energy/emit_fact
# -- see docs/INFINITE_STACKS_CONTRACTS.md §5). Every general/background/
# persona card below is authored LIVE-only on purpose so any background
# produces a buildable starting deck this wave. `comma_cut` and
# `subtext_flash` (both equipment-granted, optional per §13.2's "up to two")
# deliberately keep using PLANNED combat ops (damage/apply_condition/
# reveal_tell) -- real future combat content, not yet buildable into a deck,
# and the real-content example tests/test_stacks_heroes.py uses for the loud
# build-time rejection case.
cards:
  # --- General (5) -----------------------------------------------------------

  - id: steady_strike
    name: Steady Strike
    prose:
      fallback: A disciplined melee blow, thrown with more control than force.
      accessible: "Card: Steady Strike. Main action, melee range, targets one enemy. Force + Bonk check against DC 11."
    accessible_text: "Steady Strike. Main action. Melee range. Target: one enemy. Roll Force + Bonk vs DC 11. Strong success deals 3 damage, clean success deals 2, a costly success deals 1 damage, a setback grants the enemy Advantage on its next action."
    timing: main_action
    range: melee
    legal_targets: [enemy]
    keywords: [Combat, Melee, Bonk]
    art_ref: src/assets/cards/bonk.png
    check:
      attribute: force
      skill: bonk
      dc: 11
      outcomes:
        strong_success:
          - {op: damage, args: {amount: 3}}
        success:
          - {op: damage, args: {amount: 2}}
        cost:
          - {op: damage, args: {amount: 1}}
        setback:
          - {op: grant_disadvantage, args: {}}
    combination_tags: [melee, bonk]
    end_state: discard
    source: general

