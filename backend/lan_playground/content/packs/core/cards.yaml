      fallback: Every lock has a shortcut if you've picked enough of them.
      accessible: "Card: Quick Bypass. Main action, affects the current room, targets self. Reveals what lies past the north connector, no roll required. Back-Alley Fixer background card."
    accessible_text: "Quick Bypass. Main action. Range: the current room. Target: self. Reveals what lies past the north connector. No roll."
    timing: main_action
    range: room
    legal_targets: [self]
    base_effects:
