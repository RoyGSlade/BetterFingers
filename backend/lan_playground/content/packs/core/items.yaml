# The Lost Meaning: Infinite Stacks -- core pack.
# 10 items from infinite_stacks.md §13.5 plus the 6 background starting items
# named in §11.3 (questionable_seal, improvised_tools, repair_patch,
# battered_buckler, family_notes, counterfeit_charm).
items:
  - id: argumentative_buckler
    name: Argumentative Buckler
    prose:
      fallback: A successful Block lets the hero Challenge the attacker's stated intent.
      accessible: "Item: Argumentative Buckler. A shield. On a successful Block reaction, the hero may Challenge the attacker's stated intent."
    slot_cost: 1
    passive_effects:
      - op: block_damage
        args: {amount: 1}
    tags: [shield, reaction]

  - id: comma_blade
    name: Comma Blade
    prose:
      fallback: A called Break can separate an enemy from one aura or linked ally.
      accessible: "Item: Comma Blade. A melee weapon. Grants the Comma Cut card, a called Break that can separate an enemy from one aura or linked ally."
    slot_cost: 1
    granted_card_ids: [comma_cut]
    tags: [weapon, melee]

  - id: boots_of_premature_entrance
    name: Boots of Premature Entrance
    prose:
      fallback: Breach a tile for 2 Energy; become Startled if it contains immediate danger.
      accessible: "Item: Boots of Premature Entrance. Using them breaches a tile for 2 Energy instead of the usual 3; the hero becomes Startled if the tile holds immediate danger."
    slot_cost: 1
    use_effects:
      - op: spend_energy
        args: {amount: 2}
    tags: [boots, exploration]

  - id: lantern_of_subtext
    name: Lantern of Subtext
    prose:
      fallback: Once per room, reveal one observable emotional or corruption tell.
      accessible: "Item: Lantern of Subtext. Grants the Subtext Flash card, usable once per room to reveal one observable emotional or corruption tell."
    slot_cost: 1
    granted_card_ids: [subtext_flash]
    tags: [light, utility]

  - id: emergency_semicolon
    name: Emergency Semicolon
    prose:
      fallback: Combine two weaker allied setup effects into one action.
      accessible: "Item: Emergency Semicolon. Consumable. Combines two weaker allied setup effects into a single action."
    slot_cost: 1
    consumable: true
    use_effects:
      - op: combine_effects
        args: {slots: 2}
    tags: [combo, support]

  - id: field_suture
    name: Field Suture
    prose:
      fallback: Stabilize a Downed hero or treat Bleeding; consumed on use.
      accessible: "Item: Field Suture. Consumable medical supply. Stabilizes a Downed hero or treats the Bleeding condition."
    slot_cost: 1
    consumable: true
    use_effects:
      - op: stabilize
        args: {}
      - op: remove_condition
        args: {condition_id: bleeding}
    tags: [medicine]

  - id: bottled_footnote
    name: Bottled Footnote
    prose:
      fallback: Ask for the first puzzle hint without increasing corruption.
      accessible: "Item: Bottled Footnote. Consumable. Requests the first puzzle hint without increasing Spire corruption."
    slot_cost: 1
    consumable: true
    use_effects:
      - op: emit_fact
        args: {fact_id: hint_requested_no_corruption}
    tags: [puzzle_tool]

  - id: index_hook
    name: Index Hook
    prose:
      fallback: Pull an object, card, or willing ally between nearby positions.
      accessible: "Item: Index Hook. Pulls an object, card, or willing ally between nearby positions."
    slot_cost: 1
    use_effects:
      - op: move_target
        args: {distance: 2}
    tags: [utility, pull]

  - id: suspicious_sandwich
    name: Suspicious Sandwich
    prose:
      fallback: Heal modest HP; roll its known spoilage check if carried across three floors.
      accessible: "Item: Suspicious Sandwich. Consumable food. Heals a modest amount of HP; carrying it across three floors triggers a known spoilage check."
    slot_cost: 1
    consumable: true
    use_effects:
      - op: heal
        args: {amount: 2}
    tags: [food, perishable]

  - id: red_string_spool
    name: Red String Spool
    prose:
      fallback: Connect two clues so all players can inspect them as one evidence set.
      accessible: "Item: Red String Spool. Connects two clues so every player can inspect them together as one evidence set."
    slot_cost: 1
    use_effects:
      - op: emit_fact
        args: {fact_id: clues_linked}
    tags: [puzzle_tool, sharing]

  - id: questionable_seal
    name: Questionable Seal
    prose:
      fallback: A wax seal of dubious but currently unchallenged authority.
      accessible: "Item: Questionable Seal. A wax seal of dubious but currently unchallenged authority. Starting item for the Exiled Court Scribe background."
    slot_cost: 1
    use_effects:
      - op: emit_fact
        args: {fact_id: seal_presented}
    tags: [contract, authority]

  - id: improvised_tools
    name: Improvised Tools
    prose:
      fallback: A battered kit of tools good enough for most repair jobs.
      accessible: "Item: Improvised Tools. A battered repair kit. Starting item for the Back-Alley Fixer background."
    slot_cost: 1
    passive_effects:
      - op: grant_advantage
        args: {}
    tags: [tools, tinker]

  - id: repair_patch
    name: Repair Patch
    prose:
      fallback: A single-use patch that mends a damaged piece of equipment.
      accessible: "Item: Repair Patch. Consumable. Mends a single damaged piece of equipment. Starting item for the Back-Alley Fixer background."
    slot_cost: 1
    consumable: true
    use_effects:
      - op: emit_fact
        args: {fact_id: equipment_repaired}
    tags: [repair]

  - id: battered_buckler
    name: Battered Buckler
    prose:
      fallback: A dented shield that has already stopped worse blows than this one.
      accessible: "Item: Battered Buckler. A dented shield. Starting item for the Retired Monster Hunter background."
    slot_cost: 1
    passive_effects:
      - op: block_damage
        args: {amount: 1}
    tags: [shield]

  - id: family_notes
    name: Family Notes
    prose:
      fallback: Hand-written notes on one enemy family's habits and weaknesses.
      accessible: "Item: Family Notes. Hand-written notes on one enemy family's habits and weaknesses. Starting item for the Retired Monster Hunter background."
    slot_cost: 1
    use_effects:
      - op: reveal_tell
        args: {}
    tags: [knowledge, bestiary]

  - id: counterfeit_charm
    name: Counterfeit Charm
    prose:
      fallback: A cheap trinket that photographs like an heirloom.
      accessible: "Item: Counterfeit Charm. A cheap trinket that presents like an heirloom. Starting item for the Traveling Charlatan background."
    slot_cost: 1
    use_effects:
      - op: emit_fact
        args: {fact_id: item_disguised}
    tags: [deception]
