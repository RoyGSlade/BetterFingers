# The Lost Meaning: Infinite Stacks -- core pack.
# 3 enemies across 2 families (goblin, punctuation) with §15.1 threat costs
# and §14.6 telegraphed intents, each with plain-text counterplay.
enemies:
  - id: goblin_firestarter
    name: Goblin Firestarter
    family: goblin
    prose:
      fallback: Carries a guttering torch and a grudge against anything flammable.
      accessible: "Enemy: Goblin Firestarter. Minion, threat cost 1. Marks a shelf to ignite, then ignites it on a later turn."
    threat_tier: minion
    threat_cost: 1
    hp: 6
    defense: 11
    intents:
      - id: mark_shelf
        prose:
          fallback: The goblin marks the shelf it plans to ignite.
          accessible: "Intent: Mark Shelf. The goblin marks a shelf it plans to ignite on a later turn."
        trigger: always
        effects:
          - {op: emit_fact, args: {fact_id: shelf_marked}}
        counterplay: Douse or move the marked shelf before the goblin's next turn to stop the ignite intent from following through.
      - id: ignite_shelf
        prose:
          fallback: The goblin touches its torch to the shelf it already marked.
          accessible: "Intent: Ignite Shelf. The goblin ignites the shelf it marked on a prior turn, applying Burning to whoever is near it."
        trigger: shelf_marked
        effects:
          - {op: apply_condition, args: {condition_id: burning}}
        counterplay: Interrupt the goblin, douse the marked shelf first, or stay clear of it when this intent is telegraphed.
    non_elimination_routes: [douse_and_flee, disarm_the_torch]

  - id: goblin_bruiser
    name: Goblin Bruiser
    family: goblin
    prose:
      fallback: Bigger than the others, and proud of exactly one thing about that.
      accessible: "Enemy: Goblin Bruiser. Standard, threat cost 2. Telegraphs a heavy swing or a shove toward the party's position."
    threat_tier: standard
    threat_cost: 2
    hp: 10
    defense: 12
    intents:
      - id: heavy_swing
        prose:
          fallback: The bruiser plants its feet and winds up a heavy swing.
          accessible: "Intent: Heavy Swing. The bruiser winds up a heavy melee swing against the nearest hero."
        trigger: always
        effects:
          - {op: damage, args: {amount: 3}}
        counterplay: Move out of melee range, Block, or Dodge before the swing lands.
      - id: shove_back
        prose:
          fallback: The bruiser lines up to shove a hero away from the exit.
          accessible: "Intent: Shove Back. The bruiser prepares to shove the nearest hero away from the room's exit."
        trigger: hero_near_exit
        effects:
          - {op: move_target, args: {distance: 1}}
        counterplay: Reposition away from the exit line, or accept the shove and use the opening it creates.
    non_elimination_routes: [rout_when_alone, barricade_the_doorway]

  - id: punctuation_spider
    name: Punctuation Spider
    family: punctuation
    prose:
      fallback: Legs like em dashes, bite like a comma splice nobody caught in time.
      accessible: "Enemy: Punctuation Spider. Specialist, threat cost 3. Splits an active buff into two weaker effects, or bites to sicken."
    threat_tier: specialist
    threat_cost: 3
    hp: 14
    defense: 13
    intents:
      - id: split_buff
        prose:
          fallback: The spider prepares to split one active buff into two weaker effects.
          accessible: "Intent: Split Buff. The spider prepares to split one active party buff into two weaker effects."
        trigger: ally_has_buff
        effects:
          - {op: emit_fact, args: {fact_id: buff_split_prepared}}
        counterplay: Spend or remove the targeted buff before the spider's turn resolves so there is nothing left to split.
      - id: venomous_bite
        prose:
          fallback: The spider lunges for a bite that leaves its target sickened.
          accessible: "Intent: Venomous Bite. The spider lunges at the nearest hero; a hit applies Sickened."
        trigger: always
        effects:
          - {op: apply_condition, args: {condition_id: sickened}}
        counterplay: Dodge, Block, or keep distance -- the bite must land to apply Sickened.
    non_elimination_routes: [capture_for_study]
