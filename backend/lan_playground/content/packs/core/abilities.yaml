# The Lost Meaning: Infinite Stacks -- core pack.
# Wave-6 addition (board task #20, docs/PLAYTEST_FINDINGS_2026-07-19.md §E1):
# basic capabilities that used to be filler cards ("a basic ability like 'I
# look around'") now live here instead, as passive or auto/manually-triggered
# abilities on the character sheet -- NOT cards. Four offenders migrated:
#   - read_the_room (general card)              -> keen_observer
#   - plain_warning (general card)               -> plain_speaking
#   - veteran_instinct (retired_monster_hunter)   -> veteran_instinct (kept name)
#   - trophy_notes (retired_monster_hunter)       -> trophy_notes (kept name)
# `signature_flourish` (the mandatory persona card) was NOT migrated here --
# deck.build_starting_deck requires exactly one persona signature card per
# background, so removing it would break the deck composition gate. It was
# redesigned in place in cards.yaml instead (E2's "cut OR redesigned" branch).
#
# Every ability's trigger/frequency/effects are constrained by
# content.schemas.Ability.__post_init__ to exactly the set stacks-abilities
# (engine lane) committed to executing this wave -- see that class's
# docstring for the full contract. No ability here references an op or
# trigger the engine won't actually run (director ruling 2026-07-20 04:26:
# "no shelf-ware").
abilities:
  - id: keen_observer
    name: Keen Observer
    prose:
      fallback: You don't have to think about reading a room anymore. You just do it.
      accessible: "Ability: Keen Observer. Trigger: the instant you breach into a new room, before you spend a card, action, or Energy on anything else. Effect: you get a free Insight + Read check against DC 11. Why it's good: a clean success on that check hands you one concrete, actionable detail about the room -- a hidden exit, an odd object, a discrepancy worth acting on -- every single room, for free, all game."
    trigger: on_room_enter
    frequency: unlimited
    effects:
      - {op: grant_check, args: {attribute: insight, skill: read, dc: 11}}
    source: general

  - id: plain_speaking
    name: Plain Speaking
    prose:
      fallback: One short, unambiguous sentence, aimed so everyone in earshot understands it the same way.
      accessible: "Ability: Plain Speaking. Trigger: manually invoked, once per room, no card or action spent. Effect: you get a free Presence + Wordcraft check against DC 8. Why it's good: it's a low-DC check on demand -- when a room's social read is close, this is a guaranteed extra roll to make sure your warning actually lands, at zero resource cost."
    trigger: manual
    frequency: once_per_room
    effects:
      - {op: grant_check, args: {attribute: presence, skill: wordcraft, dc: 8}}
    source: general

  - id: veteran_instinct
    name: Veteran Instinct
    prose:
      fallback: An old scar aches right before trouble does, and this time it means something.
      accessible: "Ability: Veteran Instinct. Trigger: automatic, the instant a fight starts, before initiative is even rolled. Effect: you get a free Finesse + Read check against DC 8. Why it's good: every single fight opens with a free, low-DC read on the danger in front of you -- information you'd otherwise have to spend a card or a whole turn to get, and you get it before anyone has acted."
    trigger: on_encounter_start
    frequency: unlimited
    effects:
      - {op: grant_check, args: {attribute: finesse, skill: read, dc: 8}}
    source: retired_monster_hunter

  - id: trophy_notes
    name: Trophy Notes
    prose:
      fallback: Flip straight to the page about this exact kind of monster.
      accessible: "Ability: Trophy Notes. Trigger: manually invoked, once per fight, no card or action spent. Effect: you get a free Insight + Read check against DC 8. Why it's good: it's a guaranteed low-DC roll you can call whenever a fight is going badly -- a dedicated out, once per fight, that costs nothing but the choice to use it."
    trigger: manual
    frequency: once_per_fight
    effects:
      - {op: grant_check, args: {attribute: insight, skill: read, dc: 8}}
    source: retired_monster_hunter
