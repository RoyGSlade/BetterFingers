# Required CI on every pull request and push (review finding #13).
#
# The full Python suite previously ran only in the manually-triggered installer
# workflow, and the Electron e2e only when app/**, server.py, or
# requirements.txt changed — so edits to recordings.py, history_store.py,
# model_manager.py, llm_engine.py, transcriber.py, injector.py, etc. shipped
# with no tests run at all. This workflow closes that gap; expensive packaging
# stays path-filtered where it already lives.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    # Cross-platform Python test matrix (review finding: P1 CI matrix).
    # Linux runs 3.12 + 3.13; Windows and macOS run 3.13 to match the version
    # the packaged builds ship (build-installer.yml uses Python 3.13). The
    # packaged-app smoke on real Windows/macOS runners (with signing) is a
    # separate manual follow-up — see build-installer.yml — this job only
    # exercises the Python unit suite so regressions are caught on all three
    # OSes on every PR.
    name: python-tests (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13" # matches packaged build (build-installer.yml)
          - os: macos-latest
            python-version: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Python test suite
        run: python -m pytest -q tests

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Verify Node version pin
        # Node is pinned to major 24 across every workflow; fail loudly if the
        # runner drifts so the packaged build's toolchain stays reproducible.
        run: |
          node -v
          major="$(node -p 'process.versions.node.split(".")[0]')"
          if [ "$major" != "24" ]; then
            echo "::error::Expected Node 24.x, got $(node -v)"
            exit 1
          fi

      - name: Install app dependencies
        # `npm ci` fails if package.json and package-lock.json disagree, so this
        # already enforces that the lockfile is committed and in sync.
        working-directory: app
        run: npm ci

      - name: Verify Electron toolchain is lock-pinned
        # Guards against an unpinned Electron/electron-builder/electron-vite
        # sneaking in: assert each resolves to a concrete version in the lock.
        working-directory: app
        run: |
          node -e '
            const lock = require("./package-lock.json");
            const pkgs = lock.packages || {};
            for (const dep of ["electron", "electron-builder", "electron-vite"]) {
              const entry = pkgs["node_modules/" + dep];
              if (!entry || !entry.version) {
                console.error("::error::" + dep + " is not pinned in package-lock.json");
                process.exit(1);
              }
              console.log(dep + " -> " + entry.version);
            }
          '

      - name: Build renderer + main
        working-directory: app
        run: npm run build

      - name: Renderer/main unit tests
        working-directory: app
        run: npm run test:unit

      - name: Syntax-check main-process sources
        working-directory: app
        run: |
          for f in src/main/*.js src/preload/*.js; do
            node --check "$f"
          done

  electron-smoke:
    # Model-free Electron smoke on every PR — the full screenshot suite stays
    # in e2e-screenshots.yml. Ubuntu 24.04 needs the AppArmor userns sysctl
    # for Electron's sandbox.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Playwright browsers + OS deps
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Allow unprivileged user namespaces (Electron sandbox)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Build Electron app
        working-directory: app
        run: npm run build

      - name: Run model-free Electron smoke suite
        working-directory: app
        env:
          BETTERFINGERS_PYTHON: python
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npx playwright test tests/electron-smoke.spec.js

      # REDACTION GUARD: these logs/screenshots may capture transcribed text or
      # window titles. The app redacts sensitive strings server-side via
      # log_redaction.py before they hit disk; do NOT add raw stdout dumps or
      # unredacted app logs to this artifact path. Keep uploads scoped to
      # Playwright's own output. If richer app-log capture is added later, route
      # it through log_redaction.py first (server-side concern, not this file).
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: electron-smoke-failures
          path: |
            app/test-results/**
            app/playwright-report/**
          if-no-files-found: ignore

  electron-smoke-crossplatform:
    # Best-effort model-free Electron smoke on Windows + macOS. GitHub-hosted
    # Windows/macOS runners have a real display (no Xvfb needed), but the
    # Electron sandbox and Playwright launch are noticeably flakier there than
    # on the Linux runner, so this job is NON-BLOCKING (continue-on-error).
    # It is a signal, not a gate. A real packaged-app smoke on Windows/macOS
    # (needing signing + notarization on dedicated runners) is a separate
    # manual follow-up for the repo owner and is intentionally not attempted here.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13" # matches packaged build (build-installer.yml)
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: app
        run: npx playwright install chromium

      - name: Build Electron app
        working-directory: app
        run: npm run build

      - name: Run model-free Electron smoke suite
        working-directory: app
        env:
          BETTERFINGERS_PYTHON: python
        run: npx playwright test tests/electron-smoke.spec.js

      # REDACTION GUARD: see the Linux electron-smoke job above — keep this
      # artifact scoped to Playwright output; unredacted app logs must go
      # through log_redaction.py (server-side) before upload.
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: electron-smoke-crossplatform-${{ matrix.os }}
          path: |
            app/test-results/**
            app/playwright-report/**
          if-no-files-found: ignore
