name: build-installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Run test suite
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          python -m pytest -q tests -W default 2>&1 | Tee-Object -FilePath build/pytest.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/check_project_deprecations.py build/pytest.log

      - name: Run smoke suite
        shell: powershell
        run: |
          python -m pytest -q tests -m smoke

      # Runs electron-vite build + the PyInstaller backend bundle + electron-builder's
      # NSIS packaging in one step. Output lands in app/release/ (see
      # directories.output in app/package.json).
      - name: Build installer (electron-builder)
        working-directory: app
        run: npm run dist:win

      - name: Enforce payload size budget
        shell: powershell
        run: |
          $payloadDir = "app\release\win-unpacked"
          if (-not (Test-Path $payloadDir)) {
            throw "electron-builder output not found at $payloadDir"
          }
          $sizeBytes = (Get-ChildItem $payloadDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $sizeMb = [math]::Round($sizeBytes / 1MB, 2)
          Write-Host "Packaged app size: $sizeMb MB"
          $limitMb = 2500
          if ($sizeMb -gt $limitMb) {
            throw "Payload size $sizeMb MB exceeds budget $limitMb MB"
          }
          Write-Host "Top 15 largest files:"
          Get-ChildItem $payloadDir -Recurse -File |
            Sort-Object Length -Descending |
            Select-Object -First 15 FullName, @{Name='SizeMB';Expression={[math]::Round($_.Length / 1MB, 2)}} |
            Format-Table -AutoSize

      - name: Locate installer artifact
        id: installer
        shell: powershell
        run: |
          $installer = Get-ChildItem "app\release" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No .exe installer found in app\release"
          }
          Write-Host "Found installer: $($installer.FullName)"
          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT

      - name: Smoke check installer install/uninstall
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File tools/smoke_installer.ps1 -InstallerPath "${{ steps.installer.outputs.path }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: BetterFingers-Installer
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.installer.outputs.path }}

  sbom:
    # Software Bill of Materials (CycloneDX) for release/tag builds. Syft scans
    # the checked-out source, capturing both the Python (requirements*) and npm
    # (app/package-lock.json) dependency trees. Runs on Linux for speed; the
    # SBOM is source/dependency based, not OS-specific. Uploaded as a build
    # artifact and, on tag pushes, attached to the GitHub Release.
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach SBOM asset to the release on tag builds
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: betterfingers-sbom.cdx.json
          artifact-name: betterfingers-sbom.cdx.json

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: betterfingers-sbom.cdx.json
