name: build-installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install pyinstaller

      - name: Run test suite
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          python -m pytest -q tests -W default 2>&1 | Tee-Object -FilePath build/pytest.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/check_project_deprecations.py build/pytest.log

      - name: Run smoke suite
        shell: powershell
        run: |
          python -m pytest -q tests -m smoke

      - name: Build app with PyInstaller
        shell: powershell
        run: |
          pyinstaller BetterFingers.spec -y

      - name: Enforce payload size budget
        shell: powershell
        run: |
          $payloadDir = "dist\\BetterFingers"
          if (-not (Test-Path $payloadDir)) {
            throw "PyInstaller output not found at $payloadDir"
          }
          $sizeBytes = (Get-ChildItem $payloadDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $sizeMb = [math]::Round($sizeBytes / 1MB, 2)
          Write-Host "PyInstaller payload size: $sizeMb MB"
          $limitMb = 2500
          if ($sizeMb -gt $limitMb) {
            throw "Payload size $sizeMb MB exceeds budget $limitMb MB"
          }
          Write-Host "Top 15 largest files:"
          Get-ChildItem $payloadDir -Recurse -File |
            Sort-Object Length -Descending |
            Select-Object -First 15 FullName, @{Name='SizeMB';Expression={[math]::Round($_.Length / 1MB, 2)}} |
            Format-Table -AutoSize

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis --no-progress -y

      - name: Build installer
        shell: powershell
        run: |
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            throw "NSIS compiler not found at $makensis"
          }
          & $makensis "installer\\BetterFingers.nsi"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Smoke check installer install/uninstall
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File tools/smoke_installer.ps1 -InstallerPath "dist\\BetterFingers_Setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterFingers-Installer
          path: dist/BetterFingers_Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BetterFingers_Setup.exe
