name: e2e-screenshots

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "server.py"
      - "requirements.txt"
      - ".github/workflows/e2e-screenshots.yml"

permissions:
  contents: read

jobs:
  electron-screenshots:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Playwright browsers + OS deps
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Ubuntu 24.04 runners restrict unprivileged user namespaces via
      # AppArmor, which crashes Electron/Chromium's sandbox on launch.
      - name: Allow unprivileged user namespaces (Electron sandbox)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Build Electron app
        working-directory: app
        run: npm run build

      # Only the smoke spec runs in CI for now. review-overlay.spec.js exercises
      # TTS/LLM rewrite flows that need a real model + llama-server on disk;
      # this job doesn't provision either. See docs/REMAINING_WORK.md.
      - name: Run Electron smoke/screenshot suite
        working-directory: app
        env:
          BETTERFINGERS_PYTHON: python
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npx playwright test tests/electron-smoke.spec.js

      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-screenshots
          path: |
            app/artifacts/**
            app/test-results/**
            app/playwright-report/**
          if-no-files-found: warn
