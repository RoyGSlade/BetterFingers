name: e2e-screenshots

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "server.py"
      - "requirements.txt"
      - "requirements-linux-cpu.lock"
      - ".github/workflows/e2e-screenshots.yml"

permissions:
  contents: read

jobs:
  electron-screenshots:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        # CPU-only hashed lock: reproducible + no ~3.9 GB CUDA stack on this
        # GPU-less runner. Regenerated alongside the other locks (regen-locks.yml)
        # and gated by lock-freshness.yml.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-linux-cpu.lock

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6.5.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Playwright browsers + OS deps
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Ubuntu 24.04 runners restrict unprivileged user namespaces via
      # AppArmor, which crashes Electron/Chromium's sandbox on launch.
      - name: Allow unprivileged user namespaces (Electron sandbox)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Build Electron app
        working-directory: app
        run: npm run build

      # Both specs run model-free here: the smoke spec needs no model, and
      # review-overlay.spec.js opens from a mock draft and skips its TTS/LLM tests
      # unless BETTERFINGERS_E2E_MODEL=1 (this job provisions no model). Run the
      # whole Playwright suite. See DESIGN.md §10 M5 (U1).
      - name: Run Electron smoke + review-overlay screenshot suites
        working-directory: app
        env:
          BETTERFINGERS_PYTHON: python
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npx playwright test

      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: electron-screenshots
          path: |
            app/artifacts/**
            app/test-results/**
            app/playwright-report/**
          if-no-files-found: warn
