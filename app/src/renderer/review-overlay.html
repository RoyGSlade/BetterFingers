<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetterFingers Review</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b111d;
        --panel: #111a29;
        --panel-soft: #162234;
        --text: #f2f7ff;
        --muted: #a8b4c7;
        --border: rgba(168, 180, 199, 0.18);
        --accent: #66f2c1;
        --warning: #f6c15f;
        --danger: #ff7c87;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(140deg, rgba(102, 242, 193, 0.08), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100vh;
        border: 1px solid var(--border);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        background: rgba(17, 26, 41, 0.94);
        border-bottom: 1px solid var(--border);
        -webkit-app-region: drag;
      }

      h1 {
        margin: 0;
        font-size: 0.92rem;
        letter-spacing: 0;
      }

      .status {
        color: var(--muted);
        font-size: 0.78rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      button,
      textarea {
        font: inherit;
      }

      button,
      select {
        -webkit-app-region: no-drag;
      }

      .icon-button {
        width: 30px;
        height: 30px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        cursor: pointer;
      }

      main {
        display: grid;
        gap: 10px;
        min-height: 0;
        padding: 12px;
      }

      .text-stack {
        display: grid;
        grid-template-rows: minmax(56px, 0.36fr) minmax(130px, 1fr);
        gap: 10px;
        min-height: 0;
      }

      .raw,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
        color: var(--text);
      }

      .raw {
        padding: 10px;
        color: var(--muted);
        line-height: 1.38;
        overflow: auto;
        font-size: 0.86rem;
      }

      textarea {
        min-height: 0;
        resize: none;
        padding: 11px;
        line-height: 1.45;
        outline: none;
      }

      textarea:focus {
        border-color: rgba(102, 242, 193, 0.55);
      }

      .instruction-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .instruction-row.hidden {
        display: none;
      }

      .instruction-row textarea {
        min-height: 54px;
      }

      footer {
        display: grid;
        gap: 8px;
        padding: 10px 12px 12px;
        border-top: 1px solid var(--border);
        background: rgba(17, 26, 41, 0.82);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .button {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        padding: 9px 11px;
        cursor: pointer;
      }

      .button.primary {
        border-color: rgba(102, 242, 193, 0.5);
        background: rgba(102, 242, 193, 0.13);
      }

      .rewrite-preset {
        appearance: none;
        padding-right: 22px;
      }
      .rewrite-preset option {
        color: #000;
      }

      .button.warning {
        border-color: rgba(246, 193, 95, 0.42);
      }

      .button.danger {
        border-color: rgba(255, 124, 135, 0.42);
      }

      .button:disabled {
        cursor: wait;
        opacity: 0.62;
      }

      .message {
        min-height: 18px;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.35;
      }

      .message[data-tone="success"] {
        color: var(--accent);
      }

      .message[data-tone="warning"] {
        color: var(--warning);
      }

      .message[data-tone="danger"] {
        color: var(--danger);
      }

      .status-badge {
        display: inline-block;
        padding: 3px 6px;
        border-radius: 4px;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .state-pending { background: rgba(168, 180, 199, 0.15); color: var(--muted); }
      .state-rewriting { background: rgba(246, 193, 95, 0.15); color: var(--warning); }
      .state-rewritten { background: rgba(102, 242, 193, 0.15); color: var(--accent); }
      .state-speaking { background: rgba(102, 242, 193, 0.25); color: var(--accent); animation: pulse 1.5s infinite; }
      .state-accepted { background: rgba(102, 242, 193, 0.15); color: var(--accent); }
      .state-sent { background: rgba(102, 242, 193, 0.3); color: var(--accent); }
      .state-copied { background: rgba(246, 193, 95, 0.2); color: var(--warning); }
      .state-declined { background: rgba(255, 124, 135, 0.15); color: var(--danger); }
      .state-error { background: rgba(255, 124, 135, 0.25); color: var(--danger); }
      .state-stopped { background: rgba(255, 124, 135, 0.2); color: var(--danger); }

      .tts-backend-badge {
        font-size: 0.72rem;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .tts-backend-badge.success {
        color: var(--accent);
        border-color: rgba(102, 242, 193, 0.4);
      }
      .tts-backend-badge.danger {
        color: var(--danger);
        border-color: rgba(255, 124, 135, 0.4);
      }

      @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>Review Draft</h1>
          <div id="status" class="status" style="display:none;">Waiting for draft</div>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
            <span id="statusBadge" class="status-badge state-pending">Draft Pending</span>
            <span id="ttsBackendBadge" class="tts-backend-badge">TTS: Loading...</span>
          </div>
        </div>
        <button id="closeButton" class="icon-button" type="button" title="Close">X</button>
      </header>

      <main>
        <div class="text-stack">
          <div id="rawText" class="raw">No transcript yet.</div>
          <textarea id="finalText" spellcheck="true" placeholder="Cleaned output will appear here."></textarea>
        </div>
        <div id="instructionRow" class="instruction-row hidden">
          <textarea id="instructionText" placeholder="Record or type what you want changed."></textarea>
          <button id="runInstructionButton" class="button warning" type="button">Rewrite</button>
        </div>
      </main>

      <footer>
        <div class="actions">
          <button id="acceptButton" class="button primary" type="button">Accept</button>
          <select id="rewritePreset" class="button rewrite-preset" aria-label="Rewrite style">
            <option value="clearer">Clearer</option>
            <option value="shorter">Shorter</option>
            <option value="tone">Tone</option>
          </select>
          <button id="changeButton" class="button" type="button">Rewrite</button>
          <button id="instructButton" class="button" type="button">Instruct</button>
          <button id="readButton" class="button" type="button">Read</button>
          <button id="cancelButton" class="button danger" type="button">Cancel</button>
        </div>
        <div id="message" class="message" role="status" aria-live="polite"></div>
      </footer>
    </div>

    <script>
      const BACKEND_ORIGIN = 'http://127.0.0.1:8000';
      const statusEl = document.getElementById('status');
      const rawTextEl = document.getElementById('rawText');
      const finalTextEl = document.getElementById('finalText');
      const messageEl = document.getElementById('message');
      const instructionRow = document.getElementById('instructionRow');
      const instructionTextEl = document.getElementById('instructionText');
      const acceptButton = document.getElementById('acceptButton');
      const changeButton = document.getElementById('changeButton');
      const rewritePresetEl = document.getElementById('rewritePreset');
      const instructButton = document.getElementById('instructButton');
      const runInstructionButton = document.getElementById('runInstructionButton');
      const readButton = document.getElementById('readButton');
      const cancelButton = document.getElementById('cancelButton');
      const closeButton = document.getElementById('closeButton');

      let currentDraft = null;
      let outputSettings = null;
      let currentState = 'pending';

      function setMessage(text = '', tone = '') {
        messageEl.textContent = text;
        if (tone) {
          messageEl.dataset.tone = tone;
        } else {
          delete messageEl.dataset.tone;
        }
      }

      function setOverlayState(state, customMessage = '', tone = '') {
        currentState = state;
        const statusBadge = document.getElementById('statusBadge');
        if (!statusBadge) return;
        
        statusBadge.className = `status-badge state-${state}`;
        
        const labels = {
          'pending': 'Draft Pending',
          'rewriting': 'Rewriting',
          'rewritten': 'Rewritten',
          'speaking': 'Speaking',
          'accepted': 'Accepted',
          'sent': 'Sent',
          'copied': 'Copied Fallback',
          'declined': 'Declined',
          'error': 'Error',
          'stopped': 'Stopped'
        };
        
        statusBadge.textContent = labels[state] || state;
        
        // Update Read button text and styling based on speaking state
        if (state === 'speaking') {
          readButton.textContent = 'Stop';
          readButton.style.borderColor = 'rgba(255, 124, 135, 0.5)';
          readButton.style.backgroundColor = 'rgba(255, 124, 135, 0.13)';
        } else {
          readButton.textContent = 'Read';
          readButton.style.borderColor = '';
          readButton.style.backgroundColor = '';
        }
        
        if (customMessage) {
          let messageTone = tone;
          if (!messageTone) {
            if (state === 'error' || state === 'stopped') {
              messageTone = 'danger';
            } else if (state === 'rewriting') {
              messageTone = 'warning';
            } else if (state === 'sent' || state === 'rewritten' || state === 'accepted' || state === 'copied') {
              messageTone = 'success';
            } else {
              messageTone = '';
            }
          }
          setMessage(customMessage, messageTone);
        }
      }

      async function updateTtsStatusBadge() {
        const ttsBadge = document.getElementById('ttsBackendBadge');
        if (!ttsBadge) return;
        try {
          const status = await fetchJson(`${BACKEND_ORIGIN}/runtime/tts-status`, {}, 5000);
          if (status.ok) {
            ttsBadge.textContent = `TTS: ${status.backend}`;
            ttsBadge.className = 'tts-backend-badge success';
            ttsBadge.style.borderColor = 'rgba(102, 242, 193, 0.4)';
            ttsBadge.title = status.message || '';
          } else {
            ttsBadge.textContent = `TTS: ${status.backend}`;
            ttsBadge.className = 'tts-backend-badge danger';
            ttsBadge.style.borderColor = 'rgba(255, 124, 135, 0.4)';
            ttsBadge.title = status.message || '';
            if (status.libsndfile_missing) {
              setOverlayState('error', status.message);
            }
          }
        } catch (error) {
          ttsBadge.textContent = 'TTS: unavailable';
          ttsBadge.className = 'tts-backend-badge danger';
          ttsBadge.style.borderColor = 'rgba(255, 124, 135, 0.4)';
          ttsBadge.title = `Failed to fetch TTS status: ${error.message}`;
        }
      }

      function stopTtsIfSpeaking() {
        if (currentState === 'speaking') {
          postJson(`${BACKEND_ORIGIN}/tts/stop`, {}, 2000).catch(() => {});
          setOverlayState('pending');
        }
      }

      async function fetchJson(url, options = {}, timeoutMs = 120000) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, {
            cache: 'no-store',
            ...options,
            signal: controller.signal,
          });
          if (!response.ok) {
            throw new Error(`${url} failed with status ${response.status}`);
          }
          return await response.json();
        } finally {
          clearTimeout(timeout);
        }
      }

      function postJson(url, payload = {}, timeoutMs = 120000) {
        return fetchJson(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        }, timeoutMs);
      }

      function defaultSendAction() {
        if (!outputSettings?.capabilities?.supports_input_injection) {
          return 'copy_only';
        }
        return outputSettings?.send_mode === 'auto_send' ? 'open_chat_then_send' : 'paste';
      }

      async function refreshOutputSettings() {
        outputSettings = await fetchJson(`${BACKEND_ORIGIN}/runtime/output-settings`, {}, 4000);
        return outputSettings;
      }

      function renderDraft(draft) {
        currentDraft = draft;
        const status = draft?.status || 'pending';
        statusEl.textContent = draft?.id ? `Draft #${draft.id}` : 'Waiting for draft';
        rawTextEl.textContent = draft?.raw_text || 'No transcript yet.';
        finalTextEl.value = draft?.final_text || '';
        
        const stateMap = {
          'pending': 'pending',
          'accepted': 'accepted',
          'declined': 'declined',
          'sent': 'sent',
          'send_error': 'error',
          'error': 'error'
        };
        
        let targetState = stateMap[status] || 'pending';
        if (targetState === 'sent' && draft?.send_result?.fallback) {
          targetState = 'copied';
        }
        setOverlayState(targetState);
        
        if (draft?.error) {
          setMessage(draft.error, 'danger');
        } else {
          setMessage('');
        }
      }

      async function saveEdit() {
        if (!currentDraft?.id) return currentDraft;
        const nextText = finalTextEl.value || '';
        if (nextText === (currentDraft.final_text || '')) {
          return currentDraft;
        }
        currentDraft = await postJson(`${BACKEND_ORIGIN}/drafts/${currentDraft.id}/edit`, { final_text: nextText }, 10000);
        return currentDraft;
      }

      function setBusy(isBusy) {
        for (const button of [acceptButton, changeButton, rewritePresetEl, instructButton, runInstructionButton, cancelButton]) {
          button.disabled = isBusy;
        }
      }

      async function acceptDraft() {
        if (!currentDraft?.id) return;
        stopTtsIfSpeaking();
        setBusy(true);
        setOverlayState('accepted', 'Accepting...');
        try {
          await refreshOutputSettings();
          await saveEdit();
          currentDraft = await postJson(`${BACKEND_ORIGIN}/drafts/${currentDraft.id}/accept`, {}, 10000);
          if (outputSettings?.send_mode === 'auto_send') {
            const action = defaultSendAction();
            const sentDraft = await postJson(
              `${BACKEND_ORIGIN}/drafts/${currentDraft.id}/send`,
              { action: action, open_chat: action === 'open_chat_then_send' },
              120000,
            );
            renderDraft(sentDraft);
            
            const isFallback = Boolean(sentDraft.send_result?.fallback);
            if (sentDraft.send_result?.ok) {
              setOverlayState(isFallback ? 'copied' : 'sent', sentDraft.send_result?.message || 'Sent.');
              setTimeout(() => window.betterFingersReview?.hide?.(), 1200);
            } else {
              setOverlayState('error', sentDraft.send_result?.message || 'Send failed.');
            }
          } else {
            renderDraft(currentDraft);
            setOverlayState('accepted', 'Accepted. Press the primary action hotkey to send.');
          }
        } catch (error) {
          setOverlayState('error', `Accept failed: ${error.message}`);
        } finally {
          setBusy(false);
        }
      }

      async function rewriteDraft(action, customInstruction = '') {
        if (!currentDraft?.id) return;
        stopTtsIfSpeaking();
        setBusy(true);
        setOverlayState('rewriting', 'Rewriting...');
        try {
          await saveEdit();
          const rewritten = await postJson(
            `${BACKEND_ORIGIN}/drafts/${currentDraft.id}/rewrite`,
            { action, custom_instruction: customInstruction },
            120000,
          );
          if (rewritten?.ok === false) {
            setOverlayState('error', `Rewrite failed: ${rewritten.error || 'Unknown error'}`);
            return;
          }
          renderDraft(rewritten);
          setOverlayState('rewritten', 'Rewrite ready.');
        } catch (error) {
          setOverlayState('error', `Rewrite failed: ${error.message}`);
        } finally {
          setBusy(false);
        }
      }

      async function declineDraft() {
        stopTtsIfSpeaking();
        if (!currentDraft?.id) {
          window.betterFingersReview?.hide?.();
          return;
        }
        setBusy(true);
        setOverlayState('declined', 'Cancelling...');
        try {
          await postJson(`${BACKEND_ORIGIN}/drafts/${currentDraft.id}/decline`, {}, 10000);
          window.betterFingersReview?.hide?.();
        } catch (error) {
          setOverlayState('error', `Cancel failed: ${error.message}`);
        } finally {
          setBusy(false);
        }
      }

      async function readDraft() {
        if (!currentDraft?.id) return;
        try {
          await saveEdit();
          const voiceId = outputSettings?.review_tts_voice_hint || 'standard_female';
          const speed = parseFloat(outputSettings?.review_tts_speed || '1.0');
          
          setOverlayState('speaking', 'Speaking...');
          
          const result = await postJson(`${BACKEND_ORIGIN}/drafts/${currentDraft.id}/tts`, {
            text: finalTextEl.value,
            voice_id: voiceId,
            speed: speed
          }, 120000);
          
          if (result?.ok === false) {
            setOverlayState('error', result?.message || 'Read failed.');
          }
        } catch (error) {
          setOverlayState('error', `Read failed: ${error.message}`);
        }
      }

      window.betterFingersReview?.onDraft((draft) => {
        renderDraft(draft);
        refreshOutputSettings().catch(() => {});
        updateTtsStatusBadge().catch(() => {});
        // Move focus into the overlay so keyboard users land somewhere useful.
        if (!acceptButton.disabled) {
          acceptButton.focus();
        }
      });

      window.betterFingersReview?.onStatus((statusUpdate) => {
        const status = statusUpdate?.status;
        if (status === 'draft_tts_started') {
          setOverlayState('speaking', 'Speaking...');
        } else if (status === 'draft_tts_stopped') {
          if (currentState === 'speaking') {
            setOverlayState('pending', 'TTS playback completed.');
          }
        } else if (status === 'emergency_stop') {
          setOverlayState('stopped', statusUpdate?.message || 'Emergency stopped.');
        } else if (status === 'draft_sent') {
          const isFallback = Boolean(statusUpdate?.send_result?.fallback);
          setOverlayState(isFallback ? 'copied' : 'sent', statusUpdate?.send_result?.message || 'Sent.');
          setTimeout(() => window.betterFingersReview?.hide?.(), 1200);
        } else if (status === 'draft_send_error') {
          setOverlayState('error', statusUpdate?.error || 'Send failed.');
        }
      });

      acceptButton.addEventListener('click', acceptDraft);
      changeButton.addEventListener('click', () => rewriteDraft(rewritePresetEl?.value || 'clearer'));
      instructButton.addEventListener('click', () => {
        instructionRow.classList.toggle('hidden');
        if (!instructionRow.classList.contains('hidden')) {
          instructionTextEl.focus();
        }
      });
      runInstructionButton.addEventListener('click', () => {
        const instruction = instructionTextEl.value.trim();
        if (!instruction) {
          setMessage('Add an instruction first.', 'warning');
          return;
        }
        rewriteDraft('custom', instruction);
      });
      readButton.addEventListener('click', async () => {
        if (currentState === 'speaking') {
          try {
            await postJson(`${BACKEND_ORIGIN}/tts/stop`, {}, 5000);
          } catch (error) {
            setOverlayState('error', `Failed to stop TTS: ${error.message}`);
          }
        } else {
          await readDraft();
        }
      });
      cancelButton.addEventListener('click', declineDraft);
      closeButton.addEventListener('click', () => {
        stopTtsIfSpeaking();
        window.betterFingersReview?.hide?.();
      });

      // Escape dismisses the review overlay (non-destructive: hides, doesn't decline).
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          event.preventDefault();
          stopTtsIfSpeaking();
          window.betterFingersReview?.hide?.();
        }
      });

      refreshOutputSettings().catch(() => {});
      updateTtsStatusBadge().catch(() => {});
    </script>
  </body>
</html>
