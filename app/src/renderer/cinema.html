<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio — Cinematic Player</title>
<style>
  :root {
    --ink: #f4ecd8;
    --dim: #9a927f;
    --accent: #e8b15a;
    --danger: #e06a5a;
    --ok: #6ad08a;
    --panel: rgba(12, 12, 16, 0.72);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: #04040a; color: var(--ink);
    font-family: "Georgia", "Iowan Old Style", serif; overflow: hidden; cursor: default;
  }
  #stage { position: fixed; inset: 0; overflow: hidden; }

  /* Background image / atmosphere, with a slow Ken Burns drift. */
  .bg {
    position: absolute; inset: -8%; background-size: cover; background-position: center;
    opacity: 0; transition: opacity 1.4s ease; will-change: transform, opacity;
    animation: kenburns 32s ease-in-out infinite alternate;
    filter: saturate(1.05) contrast(1.02);
  }
  .bg.show { opacity: 1; }
  @keyframes kenburns {
    from { transform: scale(1.04) translate(0, 0); }
    to   { transform: scale(1.16) translate(-2%, -2%); }
  }
  /* Vignette + bottom fade so the crawl text always reads. */
  #stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(120% 90% at 50% 35%, transparent 40%, rgba(0,0,0,0.55) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.0) 25%, rgba(0,0,0,0.0) 55%, rgba(0,0,0,0.85) 100%);
  }

  /* The Star-Wars-style crawl. */
  #crawlWrap {
    position: absolute; left: 0; right: 0; bottom: 0; top: 12%;
    display: flex; justify-content: center; overflow: hidden;
    perspective: 380px; pointer-events: none;
  }
  #crawl {
    width: min(680px, 82vw); text-align: center; transform-origin: 50% 100%;
    transform: rotateX(22deg) translateY(100%);
    will-change: transform;
  }
  #crawl.run { transition: transform linear; transform: rotateX(22deg) translateY(-120%); }
  .scene-title {
    font-size: clamp(20px, 3vw, 34px); letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 0.2em; text-shadow: 0 2px 18px rgba(0,0,0,0.8);
  }
  .scene-loc { color: var(--dim); font-style: italic; margin: 0 0 1.4em; letter-spacing: 0.06em; }
  .beat { margin: 0 0 1.1em; font-size: clamp(18px, 2.3vw, 28px); line-height: 1.5;
          text-shadow: 0 2px 16px rgba(0,0,0,0.9); transition: color 0.4s, opacity 0.4s; opacity: 0.5; }
  .beat.active { color: #fff; opacity: 1; }
  .beat .who { display: block; font-size: 0.7em; letter-spacing: 0.18em; text-transform: uppercase;
               color: var(--accent); opacity: 0.85; margin-bottom: 0.15em; }
  .beat.narrator .who { color: var(--dim); }

  /* Title card shown between scenes. */
  #card {
    position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
    align-items: center; justify-content: center; text-align: center; opacity: 0;
    transition: opacity 0.8s ease; pointer-events: none;
  }
  #card.show { opacity: 1; }
  #card .eyebrow { color: var(--accent); letter-spacing: 0.3em; text-transform: uppercase; font-size: 13px; }
  #card h1 { font-size: clamp(26px, 4.4vw, 52px); margin: 0; max-width: 80vw; }

  /* Controls + per-scene review bar. */
  #ui {
    position: fixed; left: 0; right: 0; bottom: 0; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background: linear-gradient(0deg, rgba(0,0,0,0.7), rgba(0,0,0,0));
    transition: opacity 0.5s ease; font-family: system-ui, sans-serif;
  }
  #ui.hidden { opacity: 0; pointer-events: none; }
  button.ctl {
    background: var(--panel); color: var(--ink); border: 1px solid rgba(255,255,255,0.16);
    border-radius: 10px; padding: 9px 14px; font-size: 14px; cursor: pointer; backdrop-filter: blur(6px);
  }
  button.ctl:hover { border-color: var(--accent); }
  button.ctl.accept:hover { border-color: var(--ok); color: var(--ok); }
  button.ctl.reject:hover { border-color: var(--danger); color: var(--danger); }
  #sceneInfo { color: var(--dim); font-size: 13px; min-width: 130px; }
  #sceneInfo b { color: var(--ink); }
  .spacer { flex: 1 1 auto; }
  #status {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    padding: 6px 16px; font-family: system-ui, sans-serif; font-size: 13px; color: var(--dim);
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  #status.show { opacity: 1; }
  #overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 20;
  }
  #overlay.hidden { display: none; }
  .modal {
    background: #15151c; border: 1px solid rgba(255,255,255,0.14); border-radius: 14px;
    padding: 22px; width: min(460px, 90vw); font-family: system-ui, sans-serif;
  }
  .modal h3 { margin: 0 0 6px; color: var(--ink); }
  .modal p { color: var(--dim); margin: 0 0 14px; font-size: 14px; }
  .modal textarea {
    width: 100%; min-height: 90px; background: #0c0c12; color: var(--ink);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 8px; padding: 10px; resize: vertical;
    font-family: inherit; font-size: 14px;
  }
  .modal .row { display: flex; gap: 10px; margin-top: 14px; }
  .modal .seg { display: flex; gap: 6px; margin: 10px 0; }
  .modal .seg button { flex: 1; }
  .modal .seg button.on { border-color: var(--accent); color: var(--accent); }
  #empty {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--dim); font-family: system-ui, sans-serif; padding: 30px;
  }
  #empty.hidden { display: none; }
  .kbd { font-family: ui-monospace, monospace; background: rgba(255,255,255,0.08);
         padding: 1px 6px; border-radius: 5px; color: var(--ink); }
</style>
</head>
<body>
  <div id="stage">
    <div id="bgA" class="bg"></div>
    <div id="bgB" class="bg"></div>
    <div id="crawlWrap"><div id="crawl"></div></div>
    <div id="card"><div class="eyebrow">Scene</div><h1 id="cardTitle"></h1></div>
  </div>

  <div id="status"></div>

  <div id="empty">
    <div>
      <p style="font-size:18px;color:var(--ink)">No scenes to play yet.</p>
      <p>Run the Showrunner and Scriptwriter for this project first, then reopen the player.</p>
    </div>
  </div>

  <div id="ui" class="hidden">
    <button class="ctl" id="btnPrev" title="Previous scene (←)">⏮</button>
    <button class="ctl" id="btnPlay" title="Play / Pause (Space)">▶︎ Play</button>
    <button class="ctl" id="btnNext" title="Next scene (→)">⏭</button>
    <button class="ctl" id="btnMute" title="Mute narration (m)">🔊 Voice</button>
    <span id="sceneInfo"></span>
    <span class="spacer"></span>
    <button class="ctl accept" id="btnAccept" title="Approve this scene">✓ Accept</button>
    <button class="ctl reject" id="btnReject" title="Reject &amp; rewrite">✕ Reject</button>
    <button class="ctl" id="btnRerollImage" title="Re-roll image (bump seed)">🎲 Image</button>
    <button class="ctl" id="btnRefine" title="Refine with a note">✎ Refine</button>
  </div>

  <div id="overlay" class="hidden">
    <div class="modal">
      <h3 id="mTitle">Refine this scene</h3>
      <p id="mDesc">Tell the studio what to change. It rewrites only this scene.</p>
      <div class="seg" id="mSeg">
        <button data-target="all" class="on">Script + Image</button>
        <button data-target="script">Script only</button>
        <button data-target="image">Image only</button>
      </div>
      <textarea id="mFeedback" placeholder="e.g. Make Louis colder and pettier here; end on the cigarette."></textarea>
      <div class="row">
        <button class="ctl" id="mCancel" style="flex:1">Cancel</button>
        <button class="ctl accept" id="mGo" style="flex:1">Regenerate</button>
      </div>
    </div>
  </div>

<script>
(function () {
  "use strict";
  const BACKEND = 'http://127.0.0.1:8000';
  const params = new URLSearchParams(location.search);
  const PROJECT = params.get('project') || '';

  const el = (id) => document.getElementById(id);
  const stage = el('stage'), crawl = el('crawl'), card = el('card'), cardTitle = el('cardTitle');
  const ui = el('ui'), sceneInfo = el('sceneInfo'), statusEl = el('status');
  const bgs = [el('bgA'), el('bgB')]; let bgFlip = 0;

  let scenes = [];
  let idx = 0;
  let playing = false;
  let muted = false;
  let refineTarget = 'all';
  let advanceTimer = null;
  let utterances = [];
  let musicPath = '';

  // ---- data ------------------------------------------------------------
  async function api(path, opts) {
    const res = await fetch(BACKEND + path, opts);
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || res.statusText);
    return res.json();
  }
  async function loadScenes() {
    const data = await api('/studio/projects/' + encodeURIComponent(PROJECT) + '/scenes');
    scenes = (data.scenes || []).filter(s => (s.narration_script || []).length);
    musicPath = data.music_path || '';
    if (!scenes.length) { el('empty').classList.remove('hidden'); return; }
    el('empty').classList.add('hidden');
    ui.classList.remove('hidden');
    showScene(0, false);
  }

  // ---- rendering -------------------------------------------------------
  function sceneBackground(scene) {
    // Use a rendered image if one exists; otherwise a deterministic atmospheric gradient
    // derived from the scene so each scene reads as a distinct place.
    const meta = scene || {};
    if (meta.image_url) return `url("${meta.image_url}")`;
    // A rendered scene asset (project-local) is served through the backend asset route.
    if (meta.image_path) {
      const rel = String(meta.image_path).split('/').map(encodeURIComponent).join('/');
      return `url("${BACKEND}/studio/projects/${encodeURIComponent(PROJECT)}/assets/${rel}")`;
    }
    const seed = hash(meta.image_prompt || meta.title || String(idx));
    const h1 = seed % 360, h2 = (seed * 7) % 360;
    return `linear-gradient(${seed % 180}deg, hsl(${h1} 45% 14%), hsl(${h2} 40% 6%))`;
  }
  function hash(s) { let h = 0; for (const c of String(s)) h = (h * 31 + c.charCodeAt(0)) >>> 0; return h; }

  function swapBackground(scene) {
    const next = bgs[bgFlip ^ 1], cur = bgs[bgFlip];
    next.style.backgroundImage = sceneBackground(scene);
    next.classList.add('show'); cur.classList.remove('show');
    bgFlip ^= 1;
  }

  function buildCrawl(scene) {
    crawl.classList.remove('run');
    crawl.style.transitionDuration = '0s';
    crawl.style.transform = 'rotateX(22deg) translateY(100%)';
    const beats = scene.narration_script || [];
    let html = `<p class="scene-title">${esc(scene.title || ('Scene ' + (idx + 1)))}</p>`;
    if (scene.location) html += `<p class="scene-loc">${esc(scene.location)}</p>`;
    beats.forEach((b, i) => {
      const narr = (b.speaker || 'Narrator').toLowerCase() === 'narrator';
      html += `<p class="beat ${narr ? 'narrator' : ''}" data-i="${i}">` +
              (narr ? '' : `<span class="who">${esc(b.speaker)}</span>`) +
              esc(b.line) + `</p>`;
    });
    crawl.innerHTML = html;
  }

  function totalDuration(scene) {
    const beats = scene.narration_script || [];
    const sum = beats.reduce((a, b) => a + (b.duration_seconds || 3), 0);
    return Math.max(8, sum + 3); // a little tail so the last line clears
  }

  // ---- playback --------------------------------------------------------
  function showScene(i, autoplay) {
    stopSpeech();
    clearTimeout(advanceTimer);
    idx = (i + scenes.length) % scenes.length;
    const scene = scenes[idx];
    swapBackground(scene);
    buildCrawl(scene);
    sceneInfo.innerHTML = `Scene <b>${idx + 1}</b> / ${scenes.length} · <b>${esc(scene.title || '')}</b>`;
    // Title card flash.
    cardTitle.textContent = scene.title || ('Scene ' + (idx + 1));
    card.classList.add('show');
    setTimeout(() => card.classList.remove('show'), 1600);
    if (autoplay !== false) play(); else pause();
  }

  function play() {
    const scene = scenes[idx];
    if (!scene) return;
    playing = true; el('btnPlay').textContent = '❚❚ Pause';
    startBedsForScene(scene);
    const dur = totalDuration(scene);
    // Start the crawl.
    requestAnimationFrame(() => {
      crawl.style.transitionDuration = dur + 's';
      crawl.classList.add('run');
      crawl.style.transform = 'rotateX(22deg) translateY(-120%)';
    });
    crawl.style.animationPlayState = 'running';
    speakScene(scene);
    clearTimeout(advanceTimer);
    advanceTimer = setTimeout(() => { if (playing) next(); }, dur * 1000);
    highlightLoop(scene, dur);
  }

  function pause() {
    playing = false; el('btnPlay').textContent = '▶︎ Play';
    // Freeze the crawl where it is.
    const cs = getComputedStyle(crawl);
    crawl.style.transform = cs.transform;
    crawl.classList.remove('run');
    clearTimeout(advanceTimer);
    if (audioEl) audioEl.pause();
    pauseBeds();
    if (!audioEl && window.speechSynthesis) window.speechSynthesis.pause();
  }

  function togglePlay() { playing ? pause() : play(); }

  function next() { showScene(idx + 1, true); }
  function prev() { showScene(idx - 1, true); }

  // Highlight the beat that is roughly being spoken now (visual sync).
  function highlightLoop(scene, dur) {
    const beats = Array.from(crawl.querySelectorAll('.beat'));
    const times = []; let acc = 0;
    (scene.narration_script || []).forEach((b) => { times.push(acc); acc += (b.duration_seconds || 3); });
    const start = performance.now();
    function tick(now) {
      if (!playing || scenes[idx] !== scene) return;
      const t = (now - start) / 1000;
      let active = 0;
      for (let i = 0; i < times.length; i++) if (t >= times[i]) active = i;
      beats.forEach((bEl, i) => bEl.classList.toggle('active', i === active));
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // ---- Audio beds: project score + per-scene ambience loops --------------------
  let musicEl = null;
  let ambienceEl = null;

  function makeBedAudio(rel, volume, loop) {
    if (!rel || muted) return null;
    const audio = new Audio(assetUrl(rel));
    audio.loop = !!loop;
    audio.volume = volume;
    audio.preload = 'auto';
    audio.onerror = () => flash('Could not play ' + rel);
    return audio;
  }

  function startBedsForScene(scene) {
    stopBeds();
    if (muted) return;
    musicEl = makeBedAudio(musicPath, 0.35, true);
    ambienceEl = makeBedAudio(scene && scene.ambience_path, 0.22, true);
    [musicEl, ambienceEl].filter(Boolean).forEach((audio) => {
      audio.play().catch(() => flash('Click Play again to start audio.'));
    });
  }

  function pauseBeds() {
    [musicEl, ambienceEl].filter(Boolean).forEach((audio) => audio.pause());
  }

  function stopBeds() {
    [musicEl, ambienceEl].filter(Boolean).forEach((audio) => {
      audio.pause();
      audio.onerror = null;
      audio.src = '';
      audio.load();
    });
    musicEl = null;
    ambienceEl = null;
  }

  function resumeBeds() {
    [musicEl, ambienceEl].filter(Boolean).forEach((audio) => audio.play().catch(() => {}));
  }

  // ---- Narration audio: prefer rendered per-beat files, else browser speech ----
  let audioEl = null;

  function assetUrl(rel) {
    const enc = String(rel).split('/').map(encodeURIComponent).join('/');
    return `${BACKEND}/studio/projects/${encodeURIComponent(PROJECT)}/assets/${enc}`;
  }

  function speakScene(scene) {
    stopSpeech();
    if (muted) return;
    const beats = scene.narration_script || [];
    // If beats were rendered to local audio, play them in sequence (a performed reel).
    if (beats.some(b => b.audio_path)) { playBeatAudio(beats, 0, scene); return; }
    // Fallback: browser SpeechSynthesis.
    if (!window.speechSynthesis) return;
    beats.forEach((b) => {
      const u = new SpeechSynthesisUtterance(b.line);
      u.rate = 0.96; u.pitch = (b.speaker || 'Narrator') === 'Narrator' ? 0.92 : 1.0;
      utterances.push(u);
      window.speechSynthesis.speak(u);
    });
  }

  function playBeatAudio(beats, i, scene) {
    if (muted || scenes[idx] !== scene || i >= beats.length) return;
    const b = beats[i];
    if (!b.audio_path) { playBeatAudio(beats, i + 1, scene); return; }
    audioEl = new Audio(assetUrl(b.audio_path));
    audioEl.onended = () => playBeatAudio(beats, i + 1, scene);
    audioEl.onerror = () => playBeatAudio(beats, i + 1, scene);
    audioEl.play().catch(() => playBeatAudio(beats, i + 1, scene));
  }

  function stopSpeech() {
    utterances = [];
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (audioEl) { audioEl.pause(); audioEl.onended = null; audioEl = null; }
  }
  function resumeSpeech() {
    if (muted) return;
    resumeBeds();
    if (audioEl) { audioEl.play().catch(() => {}); }
    else if (window.speechSynthesis) window.speechSynthesis.resume();
  }

  // ---- review actions --------------------------------------------------
  function flash(msg) {
    statusEl.textContent = msg; statusEl.classList.add('show');
    clearTimeout(flash._t); flash._t = setTimeout(() => statusEl.classList.remove('show'), 2600);
  }
  async function acceptScene() {
    flash('Scene ' + (idx + 1) + ' accepted.');
    scenes[idx].status = 'approved';
    next();
  }
  function openRefine(quick) {
    pause();
    el('mTitle').textContent = quick ? 'Reject & rewrite scene' : 'Refine this scene';
    el('overlay').classList.remove('hidden');
    el('mFeedback').focus();
  }
  async function doRegenerate() {
    const feedback = el('mFeedback').value.trim();
    el('overlay').classList.add('hidden');
    flash('Rewriting scene ' + (idx + 1) + '…');
    try {
      const res = await api('/studio/workflow/scene/regenerate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_name: PROJECT, scene_id: scenes[idx].id, target: refineTarget, feedback }),
      });
      scenes[idx] = res.scene;
      
      // If we just re-rolled the image, try to render it immediately.
      if (refineTarget === 'image') {
        flash('Rendering new image for Scene ' + (idx + 1) + '…');
        try {
          const renderRes = await api('/studio/workflow/stage', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ project_name: PROJECT, stage: 'render_images' }),
          });
          if (renderRes.data && renderRes.data.scenes) {
            // Update all scenes to catch the newly rendered image.
            scenes = renderRes.data.scenes;
          }
        } catch (e) {
          console.warn('Auto-render failed:', e);
        }
      }
      
      el('mFeedback').value = '';
      flash('Scene ' + (idx + 1) + (refineTarget === 'image' ? ' re-rendered.' : ' rewritten.'));
      showScene(idx, true);
    } catch (e) { flash('Rewrite failed: ' + e.message); }
  }

  // ---- controls / wiring ----------------------------------------------
  el('btnPlay').onclick = togglePlay;
  el('btnNext').onclick = next;
  el('btnPrev').onclick = prev;
  el('btnAccept').onclick = acceptScene;
  el('btnReject').onclick = () => { refineTarget = 'all'; syncSeg(); openRefine(true); };
  el('btnRerollImage').onclick = async () => {
    refineTarget = 'image';
    el('mFeedback').value = '';
    await doRegenerate();
  };
  el('btnRefine').onclick = () => openRefine(false);
  el('btnMute').onclick = () => {
    muted = !muted; el('btnMute').textContent = muted ? '🔇 Muted' : '🔊 Voice';
    if (muted) { stopSpeech(); stopBeds(); }
    else if (playing) { startBedsForScene(scenes[idx]); speakScene(scenes[idx]); }
  };
  el('mCancel').onclick = () => el('overlay').classList.add('hidden');
  el('mGo').onclick = doRegenerate;
  Array.from(el('mSeg').children).forEach((b) => {
    b.onclick = () => { refineTarget = b.dataset.target; syncSeg(); };
  });
  function syncSeg() {
    Array.from(el('mSeg').children).forEach((b) => b.classList.toggle('on', b.dataset.target === refineTarget));
  }

  document.addEventListener('keydown', (e) => {
    if (!el('overlay').classList.contains('hidden')) {
      if (e.key === 'Escape') el('overlay').classList.add('hidden');
      return;
    }
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'ArrowLeft') prev();
    else if (e.key.toLowerCase() === 'm') el('btnMute').click();
    else if (e.key.toLowerCase() === 'a') acceptScene();
  });

  // Auto-hide controls when idle.
  let idleTimer = null;
  function nudgeUI() {
    ui.classList.remove('hidden');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => { if (playing) ui.classList.add('hidden'); }, 3200);
  }
  document.addEventListener('mousemove', nudgeUI);
  nudgeUI();

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }

  if (!PROJECT) { el('empty').classList.remove('hidden');
    el('empty').firstElementChild.firstElementChild.textContent = 'No project specified.'; return; }
  loadScenes().catch((e) => {
    el('empty').classList.remove('hidden');
    el('empty').firstElementChild.firstElementChild.textContent = 'Could not load scenes: ' + e.message;
  });
})();
</script>
</body>
</html>
