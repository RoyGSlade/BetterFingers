<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:* http://localhost:* ws://localhost:*; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
    <title>BetterFingers Overlay</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent !important;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        user-select: none;
      }
      /* Just the glitch circle (its background is a circular disc drawn in-canvas,
         not a box). The whole window is the drag handle. */
      .overlay-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100vw;
        height: 100vh;
        -webkit-app-region: drag;
      }
      .overlay-wrap.pos-beside { flex-direction: row; }
      .overlay-wrap.pos-above { flex-direction: column-reverse; gap: 2px; }
      .overlay-wrap.pos-below { flex-direction: column; gap: 2px; }
      .status-ring {
        flex-shrink: 0;
        display: block;
        /* width/height set inline from the size setting */
      }
      .status-text {
        font-size: 13px;
        font-weight: 600;
        color: #f5f5f5;
        white-space: nowrap;
        /* Readable while floating over arbitrary desktop content, no box needed. */
        text-shadow: 0 1px 5px rgba(0, 0, 0, 0.95), 0 0 3px rgba(0, 0, 0, 0.9);
      }
      /* "Across the centre" — overlay the label on top of the ring's middle. */
      .overlay-wrap.pos-center .status-text {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .status-text.hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="overlay-wrap" id="overlayWrap">
      <canvas id="statusRing" class="status-ring" width="70" height="70" style="width: 70px; height: 70px;"></canvas>
      <div id="statusText" class="status-text hidden">Ready</div>
    </div>

    <script type="module">
      import { createGlitchRing } from './glitch-ring.js';

      const wrap = document.getElementById('overlayWrap');
      const canvas = document.getElementById('statusRing');
      const textEl = document.getElementById('statusText');
      const ring = createGlitchRing(canvas, { state: 'idle', compact: false, theme: 'cobalt' });

      const SIZE_PX = { small: 46, medium: 70, large: 108, xlarge: 150 };
      const POSITIONS = new Set(['beside', 'above', 'below', 'center']);

      // Apply the user's overlay appearance (ring size, vibrancy, label position).
      // Window geometry (placement/opacity/bounds) is handled by the main process.
      function applyAppearance(a) {
        const px = SIZE_PX[a?.size] || SIZE_PX.medium;
        canvas.style.width = px + 'px';
        canvas.style.height = px + 'px';
        ring.setCompact(px < 60);
        ring.setVibrancy(typeof a?.vibrancy === 'number' ? a.vibrancy : 1);
        const pos = POSITIONS.has(a?.labelPos) ? a.labelPos : 'hidden';
        wrap.className = 'overlay-wrap' + (pos !== 'hidden' ? ' pos-' + pos : '');
        textEl.classList.toggle('hidden', pos === 'hidden');
      }

      // Map an IPC status payload to { ring state, text }.
      function interpret(status, payload) {
        switch (status) {
          case 'recording_started':
          case 'recording':
            return { ring: 'recording', text: 'Recording...' };
          case 'listening':
          case 'recording_armed':
            return { ring: 'listening', text: payload.message || 'Listening...' };
          case 'transcribing':
          case 'rewriting':
          case 'processing':
            return { ring: 'transcribing', text: 'Processing...' };
          case 'long_recording_detected':
          case 'chunking_started':
          case 'chunking_progress':
            return { ring: 'transcribing', text: payload.message || 'Processing...' };
          case 'chunking_stitching':
            return { ring: 'stitching', text: payload.message || 'Stitching...' };
          case 'preview_ready':
            return { ring: 'ready', text: payload.message || 'Draft ready' };
          case 'draft_sent':
            return payload.fallback
              ? { ring: 'warning', text: payload.message || 'Copied as fallback' }
              : { ring: 'ready', text: payload.message || 'Sent' };
          case 'selection_captured':
            return { ring: 'ready', text: payload.message || 'Selection captured' };
          case 'emergency_stop':
            return { ring: 'warning', text: payload.message || 'Stopped' };
          case 'draft_blocked':
          case 'draft_error':
          case 'draft_send_error':
          case 'selection_capture_failed':
            return { ring: 'error', text: payload.message || 'Needs attention' };
          default:
            return { ring: 'idle', text: status };
        }
      }

      window.betterFingersOverlay?.onStatusUpdate((update) => {
        const payload = typeof update === 'string' ? { status: update } : (update || {});
        const status = payload.status || 'unknown';
        const { ring: ringState, text: label } = interpret(status, payload);
        ring.setState(ringState);
        textEl.textContent = label;
        // Live mic RMS (when the backend includes it) pulses the ring + wave.
        if (status === 'recording' && typeof payload.amplitude === 'number') {
          ring.setAmplitude(payload.amplitude);
        } else {
          ring.setAmplitude(null);
        }
      });

      // Appearance pushed by the main process on load and whenever settings change.
      window.betterFingersOverlay?.onAppearance?.((a) => applyAppearance(a));

      // The window is click-through by default (see windows.js) so it never
      // steals clicks meant for whatever's underneath it. While the cursor is
      // over the visible ring/label, temporarily make the window hit-testable
      // again so it can still be dragged to reposition.
      wrap.addEventListener('mouseenter', () => {
        window.betterFingersOverlay?.setIgnoreMouseEvents?.(false);
      });
      wrap.addEventListener('mouseleave', () => {
        window.betterFingersOverlay?.setIgnoreMouseEvents?.(true);
      });
    </script>
  </body>
</html>
