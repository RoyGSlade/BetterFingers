<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BetterFingers Overlay</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent !important;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        user-select: none;
      }
      .overlay-container {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: rgba(13, 17, 31, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(20, 184, 166, 0.35);
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        color: #f5f5f5;
        width: 100vw;
        height: 100vh;
        -webkit-app-region: drag;
      }
      .overlay-container.success {
        border-color: rgba(102, 242, 193, 0.45);
      }
      .overlay-container.warning {
        border-color: rgba(251, 191, 36, 0.55);
      }
      .overlay-container.danger {
        border-color: rgba(255, 124, 135, 0.55);
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background-color: #9ca3af;
        flex-shrink: 0;
      }
      .dot.recording {
        background-color: #ff3b30;
        animation: pulse 1.2s infinite alternate;
        box-shadow: 0 0 10px #ff3b30;
      }
      .dot.processing {
        background-color: transparent;
        border: 2px dashed #fbbf24;
        animation: spin 1s infinite linear;
      }
      .dot.success {
        background-color: #66f2c1;
        box-shadow: 0 0 10px rgba(102, 242, 193, 0.65);
      }
      .dot.warning {
        background-color: #fbbf24;
        box-shadow: 0 0 10px rgba(251, 191, 36, 0.6);
      }
      .dot.danger {
        background-color: #ff7c87;
        box-shadow: 0 0 10px rgba(255, 124, 135, 0.62);
      }
      .status-text {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      @keyframes pulse {
        0% { transform: scale(0.85); opacity: 0.6; }
        100% { transform: scale(1.15); opacity: 1; }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="overlay-container">
      <div id="statusDot" class="dot"></div>
      <div id="statusText" class="status-text">Ready</div>
    </div>

    <script>
      // Listen for IPC messages to update status
      window.betterFingersOverlay?.onStatusUpdate((update) => {
        const payload = typeof update === 'string' ? { status: update } : (update || {});
        const status = payload.status || 'unknown';
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        const container = document.querySelector('.overlay-container');
        
        dot.className = 'dot';
        container.className = 'overlay-container';
        if (status === 'recording_started' || status === 'recording') {
          dot.classList.add('recording');
          text.textContent = 'Recording...';
        } else if (status === 'transcribing' || status === 'rewriting' || status === 'processing') {
          dot.classList.add('processing');
          text.textContent = 'Processing...';
        } else if (status === 'long_recording_detected' || status === 'chunking_started' || status === 'chunking_progress' || status === 'chunking_stitching') {
          dot.classList.add('processing');
          text.textContent = payload.message || 'Processing long recording...';
        } else if (status === 'preview_ready') {
          dot.classList.add('success');
          container.classList.add('success');
          text.textContent = payload.message || 'Draft ready';
        } else if (status === 'draft_sent') {
          const tone = payload.fallback ? 'warning' : 'success';
          dot.classList.add(tone);
          container.classList.add(tone);
          text.textContent = payload.message || (payload.fallback ? 'Copied as fallback' : 'Sent');
        } else if (status === 'draft_blocked' || status === 'draft_error' || status === 'draft_send_error' || status === 'selection_capture_failed') {
          dot.classList.add('danger');
          container.classList.add('danger');
          text.textContent = payload.message || 'Needs attention';
        } else if (status === 'selection_captured') {
          dot.classList.add('success');
          container.classList.add('success');
          text.textContent = payload.message || 'Selection captured';
        } else if (status === 'emergency_stop') {
          dot.classList.add('warning');
          container.classList.add('warning');
          text.textContent = payload.message || 'Stopped';
        } else {
          text.textContent = status;
        }
      });
    </script>
  </body>
</html>
